<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神祕塔羅：命運占卜模擬器</title>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            /* 延續你最愛的淡色系藍綠色漸層 */
            background: linear-gradient(135deg, #e8f7f5, #d1eee9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #2c4a46;
        }

        h1 {
            color: #3b7a71;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #5c8b83;
            margin-bottom: 30px;
        }

        /* 牌陣容器 */
        .card-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            min-height: 260px;
            margin-bottom: 30px;
        }

        /* 塔羅牌基本樣式 */
        .tarot-card {
            width: 140px;
            height: 240px;
            background: linear-gradient(135deg, #4d968b, #2c4a46); /* 神祕深藍綠牌背 */
            border: 3px solid #ffd166; /* 金邊框 */
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease, box-shadow 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 牌背的花紋花絮 */
        .tarot-card::before {
            content: "✨";
            font-size: 2rem;
            color: #ffd166;
            opacity: 0.8;
        }

        .tarot-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.2);
            filter: brightness(1.1);
        }

        /* 牌面翻開後的樣式 */
        .tarot-card.flipped {
            background: #ffffff !important;
            color: #2c4a46;
            transform: rotateY(180deg);
            cursor: default;
        }

        /* 翻牌後的內文修正（因為 Y 軸轉了 180 度，字要轉回來） */
        .tarot-card.flipped .card-content {
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
        }

        /* 逆位牌的倒轉視覺 */
        .tarot-card.flipped.reversed .card-content {
            transform: rotateY(180deg) rotate(180deg);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #3b7a71;
            margin-bottom: 10px;
        }

        .card-orientation {
            font-size: 0.85rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .orientation-upright {
            background-color: #d1eee9;
            color: #2c4a46;
        }

        .orientation-reversed {
            background-color: #f7e1d7;
            color: #7f5539;
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* 隱藏未翻牌時的正面內容 */
        .card-content {
            display: none;
        }

        /* 狀態文字與按鈕 */
        #status-text {
            font-size: 1.4rem;
            font-weight: bold;
            color: #3b7a71;
            min-height: 40px;
            text-align: center;
            max-width: 500px;
            line-height: 1.6;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #3b7a71;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: #4d968b;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* 洗牌時的卡片晃動動畫 */
        @keyframes shuffle {
            0% { transform: translateX(0); }
            25% { transform: translateX(-30px) rotate(-5deg); }
            50% { transform: translateX(30px) rotate(5deg); }
            75% { transform: translateX(-15px) rotate(-3deg); }
            100% { transform: translateX(0); }
        }

        .shuffling {
            animation: shuffle 0.5s ease-in-out infinite;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>神祕塔羅占卜</h1>
    <div class="subtitle">心中默念你的選擇障礙，並挑選一張命運卡牌...</div>

    <div class="card-container" id="card-deck">
        <div class="tarot-card" onclick="drawCard(this)"></div>
        <div class="tarot-card" onclick="drawCard(this)"></div>
        <div class="tarot-card" onclick="drawCard(this)"></div>
    </div>

    <div id="status-text">請點擊下方按鈕開始洗牌</div>
    <button class="btn" id="action-btn" onclick="startShuffle()">開始洗牌</button>

    <script>
        const cardDeck = document.getElementById('card-deck');
        const cards = document.querySelectorAll('.tarot-card');
        const statusText = document.getElementById('status-text');
        const actionBtn = document.getElementById('action-btn');

        let isShuffled = false;
        let isGameActive = false;

        // 核心牌組定義（你可以隨意更換裏面的字或結果）
        const tarotPool = [
            { name: "【0. 愚者】", icon: "🎒", upright: "✨ 命運直覺：大膽去做吧！別想太多，踏出第一步就對了！", reversed: "🍂 命運模糊：目前時機充滿盲目與衝動，暫停一下，請重新洗牌。" },
            { name: "【I. 魔術師】", icon: "🪄", upright: "✨ 命運直覺：你擁有解決問題的完美能力，選你想選的，絕對成功！", reversed: "🍂 命運模糊：計畫似乎有漏洞，或是有人在隱瞞，請重新洗牌。" },
            { name: "// 【II. 女祭司】", name: "【II. 女祭司】", icon: "🌙", upright: "✨ 命運直覺：聽從你內心深處的第一直覺，答案其實你早就知道了。", reversed: "🍂 命運模糊：思緒太過焦慮浮躁，目前無法看清真相，請重新洗牌。" },
            { name: "【VI. 戀人】", icon: "💞", upright: "✨ 命運直覺：這是一個充滿好運的決定！兩者結合或順應情感去選吧！", reversed: "🍂 命運模糊：正面臨左右為難的利益衝突，心意不合，請重新洗牌。" },
            { name: "【XIII. 死神】", icon: "💀", upright: "✨ 命運直覺：舊的不去新的不來！果斷放棄過去的執著，迎向新起點吧。", reversed: "🍂 命運模糊：你在抗拒改變，內心在逃避，命運陷入膠著，請重新洗牌。" }
        ];

        // 隨機色票：每場洗牌後，卡片背面會有微微不同的神祕漸層色
        function getRandomBg() {
            const hues = [160, 180, 200, 220, 280]; // 藍綠色系到神祕紫色系
            const randomHue = hues[Math.floor(Math.random() * hues.length)];
            return `linear-gradient(135deg, hsl(${randomHue}, 45%, 40%), hsl(${randomHue}, 50%, 20%))`;
        }

        // 開始洗牌
        function startShuffle() {
            isShuffled = false;
            isGameActive = false;
            statusText.innerText = "🔮 正在凝聚星象能量，洗牌中...";
            statusText.style.color = "#3b7a71";
            actionBtn.style.display = "none";

            // 重置所有卡片狀態
            cards.forEach(card => {
                card.classList.remove('flipped', 'reversed');
                card.style.background = getRandomBg();
                card.innerHTML = ''; 
                card.classList.add('shuffling');
            });

            // 模擬洗牌動態 1.5 秒
            setTimeout(() => {
                cards.forEach(card => {
                    card.classList.remove('shuffling');
                });
                statusText.innerText = "✨ 洗牌完成！請在上方三張牌中，憑直覺盲選一張。";
                isShuffled = true;
                isGameActive = true;
            }, 1500);
        }

        // 抽牌邏輯
        function drawCard(selectedCard) {
            // 沒洗牌，或是已經抽過牌了就不能重複點擊
            if (!isShuffled || !isGameActive) return;
            isGameActive = false; // 鎖定點擊

            // 隨機從牌組池抽一張牌，並且隨機決定正逆位 (50% 機率)
            const randomTarot = tarotPool[Math.floor(Math.random() * tarotPool.length)];
            const isReversed = Math.random() < 0.50; // 50% 機率逆位（等同於先前的乾枯花瓣）

            // 建立牌面 HTML 結構
            selectedCard.innerHTML = `
                <div class="card-content">
                    <div class="card-icon">${randomTarot.icon}</div>
                    <div class="card-title">${randomTarot.name}</div>
                    <div class="card-orientation ${isReversed ? 'orientation-reversed' : 'orientation-upright'}">
                        ${isReversed ? '【 逆 位 】' : '【 正 位 】'}
                    </div>
                </div>
            `;

            // 動態塞入文字並顯示
            const cardContent = selectedCard.querySelector('.card-content');
            cardContent.style.display = 'flex';

            // 觸發翻牌 CSS 動畫
            if (isReversed) {
                selectedCard.classList.add('flipped', 'reversed');
                // 【核心機制】如果抽到逆位（乾枯花瓣），必須再測一次
                statusText.innerText = randomTarot.reversed;
                statusText.style.color = "#7f5539";
                actionBtn.innerText = "命運模糊，重新洗牌";
            } else {
                selectedCard.classList.add('flipped');
                // 正位，給予直覺解答
                statusText.innerText = randomTarot.upright;
                statusText.style.color = "#1d4d44";
                actionBtn.innerText = "再次占卜";
            }

            // 讓其他沒被選中的卡片變得稍微透明
            cards.forEach(card => {
                if (card !== selectedCard) {
                    card.style.opacity = "0.4";
                }
            });
            // 恢復沒被點中的牌不可以點
            selectedCard.style.opacity = "1";

            // 顯示重來按鈕
            actionBtn.style.display = "inline-block";
        }

        // 網頁開啟時，提示使用者洗牌
        cards.forEach(card => card.style.background = 'linear-gradient(135deg, #a3b8b5, #7a9490)');
    </script>
</body>
</html>
